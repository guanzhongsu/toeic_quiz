<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>選擇刷題日</title>
  <style>
    body {
      margin: 0;
      background: #f4f7f5;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #2f3e34;
    }

    .card {
      background: #ffffff;
      padding: 32px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
      width: min(360px, 90vw);
    }

    h2 {
      margin-top: 0;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #cbd5cd;
      box-sizing: border-box;
    }

    button {
      background: #5f7c6d;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #4f6b5e;
    }

    .hint {
      margin-top: 14px;
      color: #6b7a72;
      font-size: 14px;
    }

    .error {
      margin-top: 14px;
      color: #b42318;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form class="card" id="day-form">
    <h2>📘 今日刷題</h2>
    <p>請選擇刷題天數</p>

    <select id="day-select" name="day" required>
      <option value="">載入中...</option>
    </select>

    <button type="submit">開始刷題</button>

    <div class="hint" id="hint-text">題庫讀取中...</div>
    <div class="error" id="error-text"></div>
  </form>

  <script src="app.js"></script>
</body>
</html>
